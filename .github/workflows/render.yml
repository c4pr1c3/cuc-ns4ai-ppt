name: "Render Slides"
on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install pandoc
        run: |
          wget -q https://github.com/jgm/pandoc/releases/download/3.1.11/pandoc-3.1.11-1-amd64.deb
          sudo dpkg -i pandoc-3.1.11-1-amd64.deb
      - name: Setup Node (for slide overflow self-test)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Playwright (slide overflow checker)
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Render slides & docs
        env:
          # gate the build: an overflowing slide fails the job (no clipped slide ships)
          SLIDE_OVERFLOW_GATE: "1"
        run: bash build_slides.sh
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          # clean orphan deploy: purge stale files (e.g. old reveal.js versions)
          # so the published tree is exactly the current build
          force_orphan: true
