name: "Render Slides"
on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install pandoc
        run: |
          wget -q https://github.com/jgm/pandoc/releases/download/3.1.11/pandoc-3.1.11-1-amd64.deb
          sudo dpkg -i pandoc-3.1.11-1-amd64.deb
      - name: Setup Node (for slide overflow self-test)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Playwright + CJK fonts (slide overflow checker)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq fonts-noto-cjk >/dev/null
          npm ci
          npx playwright install --with-deps chromium
      - name: Render slides & docs
        # The post-render overflow self-test runs ADVISORY here (warn-only) so that
        # rendering/font variance between environments can't block a content deploy.
        # Set SLIDE_OVERFLOW_GATE=1 locally (or in a dedicated check job) to enforce.
        run: bash build_slides.sh
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          # clean orphan deploy: purge stale files (e.g. old reveal.js versions)
          # so the published tree is exactly the current build
          force_orphan: true
